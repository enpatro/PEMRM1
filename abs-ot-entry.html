<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Absenteeism & OT Entry</title><link rel="stylesheet" href="style.css"></head><body><header><h1>Absenteeism & OT Entry</h1><button onclick="location.href='dashboard.html'">Dashboard</button></header><main class="grid"><div class="panel"><label>Month</label><select id="month"><option>Apr</option><option>May</option><option>Jun</option><option>Jul</option><option>Aug</option><option>Sep</option><option>Oct</option><option>Nov</option><option>Dec</option><option>Jan</option><option>Feb</option><option>Mar</option></select><label>Department</label><select id="dept"><option>MF</option><option>ME</option><option>UM</option><option>UE</option><option>SE</option></select><label>Overall Absenteeism %</label><input id="overallAbs" type="number" step="any"><label>JE+ Absenteeism %</label><input id="jeAbs" type="number" step="any"><label>LA Absenteeism %</label><input id="laAbs" type="number" step="any"><label>Casual Absenteeism %</label><input id="casAbs" type="number" step="any"><label>Overall OT hrs/person</label><input id="overallOt" type="number" step="any"><label>JE+ OT hrs/person</label><input id="jeOt" type="number" step="any"><label>LA OT hrs/person</label><input id="laOt" type="number" step="any"><label>Casual OT hrs/person</label><input id="casOt" type="number" step="any"><label>Remarks</label><textarea id="remarks"></textarea><button onclick="saveAbsOt()">Save Abs & OT</button><p id="msg"></p></div></main><script type="module" src="firebase-config.js"></script><script type="module" src="app.js"></script></body></html>
