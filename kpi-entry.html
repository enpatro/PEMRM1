<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KPI Entry</title><link rel="stylesheet" href="style.css"></head><body><header><h1>KPI Entry</h1><button onclick="location.href='dashboard.html'">Dashboard</button></header><main class="grid"><div class="panel"><label>Area</label><select id="area"><option>M</option><option>S</option><option>Q</option><option>C</option><option>D</option><option>E</option></select><label>Parameter</label><input id="parameter" placeholder="MTTR → Fac A"><label>102Ki Target</label><input id="target102"><label>Month Target</label><input id="monthTarget"><label>Month</label><select id="month"><option>Apr</option><option>May</option><option>Jun</option><option>Jul</option><option>Aug</option><option>Sep</option><option>Oct</option><option>Nov</option><option>Dec</option><option>Jan</option><option>Feb</option><option>Mar</option></select><label>Actual</label><input id="actual" type="number" step="any"><label>Trend</label><select id="trend"><option>→</option><option>↗</option><option>↘</option></select><label>Remarks</label><textarea id="remarks"></textarea><button onclick="saveKpi()">Save KPI</button><p id="msg"></p></div></main><script type="module" src="firebase-config.js"></script><script type="module" src="app.js"></script></body></html>
